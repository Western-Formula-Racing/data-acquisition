# Minimal local/offline stack for testing: InfluxDB3, Grafana, file-uploader
# Images are pulled automatically on first run (pull_policy: missing), then cached locally.
# Once images are cached, the stack works offline — no plugin downloads, no forced re-pulls.

networks:
  datalink:
    driver: bridge

volumes:
  grafana-storage:
  influxdb3-data:

services:
  influxdb3:
    image: influxdb:3-core
    container_name: influxdb3
    pull_policy: missing
    command: >
      influxdb3 serve --node-id influxdb3-node --object-store file --data-dir /var/lib/influxdb3 --admin-token-file /influxdb3-admin-token.json --wal-snapshot-size 10 --snapshotted-wal-files-to-keep 10
    restart: unless-stopped
    ports:
      - "9000:8181"
    environment:
      INFLUX_URL: "${INFLUXDB_URL:-http://influxdb3:8181}"
      INFLUXDB_INIT_USERNAME: "${INFLUXDB_INIT_USERNAME:-admin}"
      INFLUXDB_INIT_PASSWORD: "${INFLUXDB_INIT_PASSWORD:-dev-influxdb-password}"
    volumes:
      - influxdb3-data:/var/lib/influxdb3
      - ./influxdb3-admin-token.json:/influxdb3-admin-token.json:ro
    networks:
      - datalink
    healthcheck:
      test: [ "CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8181' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    pull_policy: missing
    restart: unless-stopped
    ports:
      - "8087:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-password}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_PROXY_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://localhost:8087"
      # No GF_INSTALL_PLUGINS — plugin downloads require internet
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 100ms
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Set GRAFANA_DASHBOARDS_PATH to load dashboards from an external directory
      # e.g. export GRAFANA_DASHBOARDS_PATH=~/daq-internal/grafana-dashboards
      - ${GRAFANA_DASHBOARDS_PATH:-./grafana/dashboards}:/var/lib/grafana/dashboards:ro
    networks:
      - datalink

  file-uploader:
    build: ./file-uploader
    container_name: file-uploader
    ports:
      - "8084:8084"
    volumes:
      - ./file-uploader:/app
      - ./${DBC_FILE_PATH:-example.dbc}:/installer/example.dbc:ro
    restart: unless-stopped
    networks:
      - datalink
    environment:
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN:-apiv3_dev-influxdb-admin-token}
      - INFLUXDB_URL=${INFLUXDB_URL:-http://influxdb3:8181}
      - DBC_FILE_PATH=/installer/example.dbc
      - GITHUB_DBC_TOKEN=${GITHUB_DBC_TOKEN:-}
      - GITHUB_DBC_REPO=${GITHUB_DBC_REPO:-Western-Formula-Racing/DBC}
      - GITHUB_DBC_BRANCH=${GITHUB_DBC_BRANCH:-main}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    depends_on:
      influxdb3:
        condition: service_healthy

# PULL:  docker compose -f docker-compose.local.yml pull
# BUILD: docker compose -f docker-compose.local.yml build file-uploader
# UP:    docker compose -f docker-compose.local.yml up -d
