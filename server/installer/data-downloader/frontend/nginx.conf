server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver with short TTL so container restarts
    # don't leave nginx with a stale cached IP for data-downloader-api.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API + scanner-triggering endpoints to the FastAPI service
    set $api_upstream http://data-downloader-api:8000;
    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300;
    }

    location = /api {
        return 301 /api/;
    }

    location / {
        try_files $uri /index.html;
    }
}
