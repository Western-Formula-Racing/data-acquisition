networks:
  datalink:
    driver: bridge
  briefer-internal:
    driver: bridge

volumes:
  grafana-storage:
  timescaledb-data:
  code-generator-chroma:
  code-generator-cache:
  briefer-jupyter:
  briefer-postgres:

services:
  # ── TimescaleDB (primary time-series store) ─────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-wfr}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-wfr_password}"
      POSTGRES_DB: "${POSTGRES_DB:-wfr}"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    networks:
      - datalink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wfr} -d ${POSTGRES_DB:-wfr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2048M

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "8087:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_EMAIL: daq@westernformularacing.com
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      # Cloudflare Zero Trust SSO via Auth Proxy
      # Cloudflare Access injects Cf-Access-Authenticated-User-Email on every authenticated request
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "Cf-Access-Authenticated-User-Email"
      GF_AUTH_PROXY_HEADER_PROPERTY: "email"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_SYNC_TTL: "60"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
      # Auto-assign Editor role when a new user is provisioned via SSO
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Editor"
      GF_SERVER_ROOT_URL: "https://grafana.westernformularacing.org"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 100ms
      # Passed through so datasource provisioning can expand $POSTGRES_USER / $POSTGRES_PASSWORD
      POSTGRES_USER: "${POSTGRES_USER:-wfr}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-wfr_password}"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - datalink
    deploy:
      resources:
        limits:
          memory: 512M

  slackbot:
    build: ./slackbot
    container_name: slackbot
    restart: unless-stopped
    # set restart to no if you want to manually control the slackbot
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_DEFAULT_CHANNEL: ${SLACK_DEFAULT_CHANNEL:-C0123456789}
      ENABLE_SLACK: ${ENABLE_SLACK:-false}
      CODE_GENERATOR_URL: "http://code-generator:3030"
    volumes:
      - ./slackbot:/app
    working_dir: /app
    command: >
      sh -c '
        if [ "$ENABLE_SLACK" = "true" ]; then
          echo "Slackbot enabled, starting...";
          python -u slack_bot.py;
        else
          echo "Slackbot disabled (ENABLE_SLACK=$ENABLE_SLACK). Exiting.";
          sleep 5;
          exit 0;
        fi
      '
    depends_on:
      - code-generator
    networks:
      - datalink
      - default
    deploy:
      resources:
        limits:
          memory: 256M

  lap-detector:
    build: ./lap-detector
    container_name: lap-detector
    restart: "no"
    profiles:
      - disabled
    ports:
      - "8050:8050"
    working_dir: /app
    volumes:
      - ./lap-detector:/app
    command: python lap-detector.py
    networks:
      - datalink
    deploy:
      resources:
        limits:
          memory: 512M

  file-uploader:
    build: ./file-uploader
    container_name: file-uploader
    ports:
      - "8084:8084"
    volumes:
      - ./file-uploader:/app
    restart: unless-stopped
    networks:
      - datalink
    environment:
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://wfr:wfr_password@timescaledb:5432/wfr}
      - FILE_UPLOADER_WEBHOOK_URL=${FILE_UPLOADER_WEBHOOK_URL:-}
      # Optional: PAT with repo read to list/download .dbc from GitHub (never sent to browser)
      - GITHUB_DBC_TOKEN=${GITHUB_DBC_TOKEN:-}
      - GITHUB_DBC_REPO=${GITHUB_DBC_REPO:-Western-Formula-Racing/DBC}
      - GITHUB_DBC_BRANCH=${GITHUB_DBC_BRANCH:-main}
      # Slack live progress updates (edits message in-place every 10%)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_DEFAULT_CHANNEL=${SLACK_DEFAULT_CHANNEL:-}
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1536M

  data-downloader-api:
    build:
      context: ./data-downloader
      dockerfile: backend/Dockerfile
    container_name: data-downloader-api
    env_file:
      - .env
    environment:
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql://wfr:wfr_password@timescaledb:5432/wfr}"
      SEASONS: "${SEASONS:-}"
    ports:
      - "8000:8000"
    volumes:
      - ./data-downloader/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - datalink
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M

  data-downloader-scanner:
    build:
      context: ./data-downloader
      dockerfile: backend/Dockerfile
    container_name: data-downloader-scanner
    env_file:
      - .env
    environment:
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql://wfr:wfr_password@timescaledb:5432/wfr}"
      SEASONS: "${SEASONS:-}"
      SCAN_DAILY_TIME: "${SCAN_DAILY_TIME}"
    command: [ "python", "-m", "backend.periodic_worker" ]
    volumes:
      - ./data-downloader/data:/app/data
    restart: unless-stopped
    networks:
      - datalink
    depends_on:
      data-downloader-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  health-monitor:
    build: ./health-monitor
    container_name: health-monitor
    restart: unless-stopped
    environment:
      HEALTH_MONITOR_INTERVAL_SECONDS: "${HEALTH_MONITOR_INTERVAL_SECONDS:-60}"
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql://wfr:wfr_password@timescaledb:5432/wfr}"
      HEALTH_MONITOR_TIMESCALEDB_CONTAINER: "${HEALTH_MONITOR_TIMESCALEDB_CONTAINER:-timescaledb}"
      HEALTH_MONITOR_SCANNER_CONTAINER: "${HEALTH_MONITOR_SCANNER_CONTAINER:-data-downloader-scanner}"
      HEALTH_MONITOR_SCANNER_API_URL: "${HEALTH_MONITOR_SCANNER_API_URL:-http://data-downloader-api:8000}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - datalink
    depends_on:
      timescaledb:
        condition: service_healthy
      data-downloader-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M

  data-downloader-frontend:
    build:
      context: ./data-downloader
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: data-downloader-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - datalink
    depends_on:
      data-downloader-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M

  # Custom sandbox execution container
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.sandbox
    container_name: sandbox
    restart: unless-stopped
    environment:
      SANDBOX_PORT: 8080
      SANDBOX_TIMEOUT: 120
      SANDBOX_MAX_FILE_MB: 20
      SANDBOX_MAX_FILES: 20
      # TimescaleDB connection for user scripts (follow-up: add psycopg2 boilerplate)
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql://wfr:wfr_password@timescaledb:5432/wfr}"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - datalink
    deploy:
      resources:
        limits:
          memory: 1024M

  # Grafana bridge - Pecan → Grafana dashboard creation API
  grafana-bridge:
    build: ./grafana-bridge
    container_name: grafana-bridge
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      GRAFANA_INTERNAL_URL: "http://grafana:3000"
      GRAFANA_EXTERNAL_URL: "https://grafana.westernformularacing.org"
      GRAFANA_API_TOKEN: "${GRAFANA_API_TOKEN}"
      GRAFANA_FOLDER_UID: "${GRAFANA_FOLDER_UID:-}"
      CORS_ORIGIN: "http://localhost:3000,https://pecan.westernformularacing.org,https://pecan-dev.westernformularacing.org"
      # Season table name for dashboard SQL generation
      DEFAULT_SEASON_TABLE: "${DEFAULT_SEASON_TABLE:-wfr26}"
    depends_on:
      - grafana
    networks:
      - datalink
    deploy:
      resources:
        limits:
          memory: 256M

  # Code generator - MiniMax/Anthropic + LangGraph + ChromaDB RAG
  code-generator:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: code-generator
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-https://api.minimaxi.com/anthropic}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-MiniMax-M2.7}"
      SANDBOX_URL: "http://sandbox:8080"
      MAX_RETRIES: "${MAX_RETRIES:-2}"
      CODE_GEN_PORT: 3030
      DATA_DIR: "/app/data"
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql://wfr:wfr_password@timescaledb:5432/wfr}"
    depends_on:
      - sandbox
      - timescaledb
    volumes:
      - ./sandbox/generated:/app/generated
      - ./data-downloader/data:/app/data:ro
      - code-generator-chroma:/app/chroma_db
      - code-generator-cache:/app/cache
    networks:
      - datalink
    deploy:
      resources:
        limits:
          memory: 1024M

  # ── Briefer (notebooks & dashboards) ──────────────────────────────────────────
  # Briefer's own PostgreSQL for metadata (separate from timescaledb)
  briefer-postgres:
    image: pgvector/pgvector:pg16
    container_name: briefer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BRIEFER_POSTGRES_DB:-briefer}
      POSTGRES_USER: ${BRIEFER_POSTGRES_USERNAME:?bri}
      POSTGRES_PASSWORD: ${BRIEFER_POSTGRES_PASSWORD:?err}
    volumes:
      - briefer-postgres:/var/lib/postgresql/data
    networks:
      - briefer-internal
      - datalink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BRIEFER_POSTGRES_USERNAME:?bri} -d briefer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # Run database migrations then exit
  briefer-migration:
    image: briefercloud/briefer-api
    container_name: briefer-migration
    command: ["sh", "-c", "npx prisma migrate deploy"]
    environment:
      NODE_ENV: production
      POSTGRES_PRISMA_URL: postgresql://${BRIEFER_POSTGRES_USERNAME:?bri}:${BRIEFER_POSTGRES_PASSWORD:?err}@briefer-postgres:5432/briefer?schema=public
    networks:
      - briefer-internal
    depends_on:
      briefer-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # Jupyter server — executes user Python/SQL code inside notebooks
  briefer-jupyter:
    image: briefercloud/briefer-jupyter
    container_name: briefer-jupyter
    restart: unless-stopped
    command: ["sh", "-c", "jupyter server --ip=0.0.0.0 --ZMQChannelsWebsocketConnection.iopub_data_rate_limit=1.0e10 --ZMQChannelsWebsocketConnection.iopub_msg_rate_limit=1.0e6 --ServerApp.max_body_size=107374182400"]
    environment:
      JUPYTER_TOKEN: ${BRIEFER_JUPYTER_TOKEN:?bri}
    volumes:
      - briefer-jupyter:/home/jupyteruser
    networks:
      - briefer-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1"

  # AI code-generation service (optional — omit or set BRIEFER_OPENAI_API_KEY empty to disable)
  briefer-ai:
    image: briefercloud/briefer-ai
    container_name: briefer-ai
    restart: unless-stopped
    environment:
      BASIC_AUTH_USERNAME: ${BRIEFER_AI_USERNAME:-briefer}
      BASIC_AUTH_PASSWORD: ${BRIEFER_AI_PASSWORD:-change-me}
      OPENAI_DEFAULT_MODEL_NAME: ${BRIEFER_OPENAI_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${BRIEFER_OPENAI_API_KEY:-}
      PORT: 8000
    networks:
      - briefer-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Briefer web (Next.js frontend)
  briefer-web:
    image: briefercloud/briefer-web
    container_name: briefer-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - briefer-internal
    depends_on:
      briefer-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # Briefer API (Node.js)
  briefer-api:
    image: briefercloud/briefer-api
    container_name: briefer-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${BRIEFER_LOG_LEVEL:-info}
      API_URL: /api
      FRONTEND_URL: /
      LOGIN_JWT_SECRET: ${BRIEFER_LOGIN_JWT_SECRET:?err}
      AUTH_JWT_SECRET: ${BRIEFER_AUTH_JWT_SECRET:?err}
      AI_API_URL: http://briefer-ai:8000
      AI_API_USERNAME: ${BRIEFER_AI_USERNAME:-briefer}
      AI_API_PASSWORD: ${BRIEFER_AI_PASSWORD:-change-me}
      PYTHON_ALLOWED_LIBRARIES: plotly,matplotlib,numpy,pandas,scipy,sklearn,seaborn,statsmodels
      POSTGRES_USERNAME: ${BRIEFER_POSTGRES_USERNAME:?bri}
      POSTGRES_PASSWORD: ${BRIEFER_POSTGRES_PASSWORD:?err}
      POSTGRES_HOSTNAME: briefer-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: briefer
      ENVIRONMENT_VARIABLES_ENCRYPTION_KEY: ${BRIEFER_ENV_VARS_ENCRYPTION_KEY:?err}
      WORKSPACE_SECRETS_ENCRYPTION_KEY: ${BRIEFER_WORKSPACE_SECRETS_ENCRYPTION_KEY:?err}
      DATASOURCES_ENCRYPTION_KEY: ${BRIEFER_DATASOURCES_ENCRYPTION_KEY:?err}
      JUPYTER_HOST: briefer-jupyter
      JUPYTER_PORT: "8888"
      JUPYTER_TOKEN: ${BRIEFER_JUPYTER_TOKEN:?bri}
    networks:
      - briefer-internal
      - datalink
    depends_on:
      briefer-postgres:
        condition: service_healthy
      briefer-migration:
        condition: service_completed_successfully
      briefer-jupyter:
        condition: service_healthy
      briefer-ai:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1024M

  # Nginx reverse proxy — exposed on host port 3030 for cloudflared to route
  briefer-nginx:
    image: nginx:1.27
    container_name: briefer-nginx
    restart: unless-stopped
    ports:
      - "3030:3000"
    volumes:
      - ./briefer/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - briefer-internal
    depends_on:
      - briefer-web
      - briefer-api
    deploy:
      resources:
        limits:
          memory: 128M

