worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    proxy_request_buffering off;
    client_max_body_size 0;

    upstream web {
        server web:4000;
    }

    upstream api {
        server api:8080;
    }

    server {
        listen 3000;

        # ── Cloudflare Zero Trust auth ───────────────────────────────────────────
        # Briefer handles its own user auth (JWT), but we inject the SSO email
        # so Briefer can auto-provision users matching their Cloudflare identity.
        # The Cf-Access-Authenticated-User-Email header is set by Cloudflare
        # Access on every request to briefer.westernformularacing.org.
        # Note: Remove this block if you prefer pure invite-only user management.

        # Handle WebSocket and long-polling for /api/socket.io
        location /api/socket.io/ {
            proxy_pass http://api/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Handle Yjs WebSocket for collaborative editing
        location /api/v2/yjs/ {
            proxy_pass http://api/v2/yjs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Proxy regular /api/* to the API service
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → frontend
        location / {
            proxy_pass http://web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
