name: Installer Stack Smoke Test

on:
  push:
    branches: [ main, deploy ]
  pull_request:
    branches: [ main, deploy ]
  workflow_dispatch:

jobs:
  stack-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Show Docker versions
      run: |
        docker version
        docker compose version

    - name: Ensure CI script is executable
      run: chmod +x ./server/dev-utils/ci/stack-smoke-test.sh

    - name: Prepare environment file for CI
      run: |
        if [ ! -f server/installer/.env ]; then
          cp server/installer/.env.example server/installer/.env
          echo "Created .env file from .env.example"
        fi
        ls -la server/installer/.env

    - name: Run installer smoke test
      env:
        CI: "true"
        DOCKER_BUILDKIT: "1"
        COMPOSE_DOCKER_CLI_BUILD: "1"
      run: ./server/dev-utils/ci/stack-smoke-test.sh