version: '3.8'

services:
  pecan-dashboard:
    build:
      context: ..
      dockerfile: host-demo/Dockerfile
    container_name: pecan-demo
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production

  broadcast-server:
    build:
      context: ../car-simulate/persistent-broadcast
    container_name: broadcast-server
    restart: unless-stopped
    ports:
      - "9080:9080"
      # - "9443:9443" # Optional: enable WSS for local demo if SSL certificates are available
    environment:
      - WS_PORT=9080
      - ENABLE_CSV=true
      - ENABLE_ACCU=true
      # Mount the CSV file from the host for the demo; the image may also contain a bundled sample CSV.
    volumes:
      - ../car-simulate/2025-01-01-00-07-00.csv:/app/2025-01-01-00-07-00.csv:ro
      # - ../car-simulate/persistent-broadcast/ssl:/app/ssl:ro
