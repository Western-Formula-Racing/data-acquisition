services:
  broadcast-server:
    build:
      context: ../car-simulate/persistent-broadcast
    container_name: broadcast-server
    restart: unless-stopped
    ports:
      - "9080:9080"
      - "9443:9443"
    environment:
      - WS_PORT=9080
      - WSS_PORT=9443
      - SSL_CERT=/app/ssl/cert.pem
      - SSL_KEY=/app/ssl/key.pem
      - DOMAIN=ws-demo.westernformularacing.org # Also supports ws-wfr.0001200.xyz via Cloudflare Tunnel
      - ENABLE_CSV=false
      - ENABLE_ACCU=true
    volumes:
      - ../car-simulate/persistent-broadcast/ssl:/app/ssl:ro
      # Optional CSV replay: add below and set ENABLE_CSV=true
      # - ../car-simulate/2025-01-01-00-07-00.csv:/app/2025-01-01-00-07-00.csv:ro
