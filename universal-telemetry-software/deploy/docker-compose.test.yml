services:
  # Car simulation (sends CAN data via UDP)
  car:
    build:
      context: ..
      args:
        GIT_HASH: ${GIT_HASH:-ci-unknown}
    container_name: daq-car
    privileged: true
    restart: unless-stopped
    environment:
      - ROLE=car # Force car mode
      - REMOTE_IP=base # Send to base container
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://car-redis:6379/0
      - SIMULATE=true # Simulation mode (no CAN hardware)
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - ENABLE_UPLINK=true # Enable uplink for bidirectional testing
    depends_on:
      car-redis:
        condition: service_healthy
    networks:
      - daq-network
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "python main.py" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  car-redis:
    image: redis:8.2
    container_name: daq-car-redis
    restart: unless-stopped
    volumes:
      - car_redis_data:/data
    networks:
      - daq-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  # Base station (receives data, serves WebSocket and status page)
  base:
    build:
      context: ..
      args:
        GIT_HASH: ${GIT_HASH:-ci-unknown}
    container_name: daq-base
    privileged: true
    restart: unless-stopped
    ports:
      - "5005:5005/udp" # UDP CAN data (for external access)
      - "5006:5006/tcp" # TCP retransmission
      - "8080:8080/tcp" # Status HTTP server
      - "9080:9080/tcp" # WebSocket for PECAN
      - "9078:9078/tcp" # TX WebSocket for PECAN Transmitter
    environment:
      - ROLE=base # Force base mode
      - REMOTE_IP=car # Receive from car container
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://base-redis:6379/0
      - WS_PORT=9080
      - STATUS_PORT=8080
      - SIMULATE=false # Base doesn't simulate
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - ENABLE_UPLINK=true # Enable uplink for bidirectional testing
      - ENABLE_TX_WS=true # Enable TX WebSocket on port 9078 (simulation mode in CI)
      - TX_WS_PORT=9078
      - DBC_FILE_PATH=/app/example.dbc
      # TimescaleDB logging
      - ENABLE_TIMESCALE_LOGGING=true
      - POSTGRES_DSN=postgresql://wfr:password@timescaledb:5432/wfr
      - TIMESCALE_TABLE=wfr26
    depends_on:
      base-redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - daq-network
    volumes:
      - ../../pecan/src/assets/dbc.dbc:/app/example.dbc:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  base-redis:
    image: redis:8.2
    container_name: daq-base-redis
    restart: unless-stopped
    ports:
      - "6379:6379/tcp" # Expose Redis for test connectivity
    volumes:
      - base_redis_data:/data
    networks:
      - daq-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  pecan:
    build:
      context: ../../pecan
      args:
        # VITE_WS_URL is set in the CI build step — not used when loading pre-built image
        VITE_WS_URL: ws://localhost:9080
    container_name: daq-pecan-test
    restart: unless-stopped
    ports:
      - "3000:80" # Pecan dashboard UI
    networks:
      - daq-network
    depends_on:
      base:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  # TimescaleDB for testing the data pipeline
  timescaledb:
    image: timescale/timescaledb:2.17.1-pg16
    container_name: daq-test-timescaledb
    environment:
      POSTGRES_USER: wfr
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wfr
    restart: "no"
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - daq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfr -d wfr"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  car_redis_data:
  base_redis_data:
  timescaledb_data:


networks:
  daq-network:
    driver: bridge

# This configuration runs both car and base station on the same machine
# for testing the full communication flow.
#
# Access points:
# - Status page: http://localhost:8080
# - WebSocket (PECAN): ws://localhost:9080
# - TX WebSocket (Transmitter): ws://localhost:9078
# - PECAN Dashboard: http://localhost:3000
# - Redis: localhost:6379
#
# The car container will generate simulated CAN data and send it via UDP
# to the base container, which will publish it to Redis and make it available
# via WebSocket.
