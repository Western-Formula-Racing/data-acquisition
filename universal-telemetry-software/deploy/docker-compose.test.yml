services:
  # Car simulation (sends CAN data via UDP)
  car:
    build: ..
    container_name: daq-car
    privileged: true
    restart: unless-stopped
    environment:
      - ROLE=car # Force car mode
      - REMOTE_IP=base # Send to base container
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://car-redis:6379/0
      - SIMULATE=true # Simulation mode (no CAN hardware)
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - ENABLE_UPLINK=true # Enable uplink for bidirectional testing
    depends_on:
      car-redis:
        condition: service_healthy
    networks:
      - daq-network
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "python main.py" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  car-redis:
    image: redis:8.2
    container_name: daq-car-redis
    restart: unless-stopped
    volumes:
      - car_redis_data:/data
    networks:
      - daq-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  # Base station (receives data, serves WebSocket and status page)
  base:
    build: ..
    container_name: daq-base
    privileged: true
    restart: unless-stopped
    ports:
      - "5005:5005/udp" # UDP CAN data (for external access)
      - "5006:5006/tcp" # TCP retransmission
      - "8080:8080/tcp" # Status HTTP server
      - "9080:9080/tcp" # WebSocket for PECAN
      - "9078:9078/tcp" # TX WebSocket for PECAN Transmitter
    environment:
      - ROLE=base # Force base mode
      - REMOTE_IP=car # Receive from car container
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://base-redis:6379/0
      - WS_PORT=9080
      - STATUS_PORT=8080
      - SIMULATE=false # Base doesn't simulate
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - ENABLE_UPLINK=true # Enable uplink for bidirectional testing
      - ENABLE_TX_WS=true # Enable TX WebSocket on port 9078 (simulation mode in CI)
      - TX_WS_PORT=9078
      - DBC_FILE_PATH=/app/example.dbc
      # InfluxDB logging
      - ENABLE_INFLUX_LOGGING=true
      - LOCAL_INFLUX_URL=http://test-influxdb3:8181
      - LOCAL_INFLUX_TOKEN=apiv3_test-token
      - LOCAL_INFLUX_ORG=WFR
      - LOCAL_INFLUX_BUCKET=WFR26
      - INFLUX_TABLE=WFR26_base
      # Cloud sync disabled in CI (no token)
      - CLOUD_INFLUX_TOKEN=
    depends_on:
      base-redis:
        condition: service_healthy
      test-influxdb3:
        condition: service_healthy
    networks:
      - daq-network
    volumes:
      - ../../pecan/src/assets/dbc.dbc:/app/example.dbc:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  base-redis:
    image: redis:8.2
    container_name: daq-base-redis
    restart: unless-stopped
    ports:
      - "6379:6379/tcp" # Expose Redis for test connectivity
    volumes:
      - base_redis_data:/data
    networks:
      - daq-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  pecan:
    build:
      context: ../../pecan
      args:
        # VITE_WS_URL is set in the CI build step — not used when loading pre-built image
        VITE_WS_URL: ws://localhost:9080
    container_name: daq-pecan-test
    restart: unless-stopped
    ports:
      - "3000:80" # Pecan dashboard UI
    networks:
      - daq-network
    depends_on:
      base:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  # InfluxDB3 for testing the data pipeline
  test-influxdb3:
    image: influxdb:3.5.0-core
    container_name: daq-test-influxdb3
    command: >
      influxdb3 serve
        --node-id influxdb3-test
        --object-store file
        --data-dir /var/lib/influxdb3
        --admin-token-file /influxdb3-admin-token.json
    restart: "no"
    ports:
      - "9000:8181" # InfluxDB3 API
    volumes:
      - ../influxdb3-admin-token-test.json:/influxdb3-admin-token.json:ro
    networks:
      - daq-network
    healthcheck:
      test: [ "CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8181' || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  car_redis_data:
  base_redis_data:


networks:
  daq-network:
    driver: bridge

# This configuration runs both car and base station on the same machine
# for testing the full communication flow.
#
# Access points:
# - Status page: http://localhost:8080
# - WebSocket (PECAN): ws://localhost:9080
# - TX WebSocket (Transmitter): ws://localhost:9078
# - PECAN Dashboard: http://localhost:3000
# - Redis: localhost:6379
#
# The car container will generate simulated CAN data and send it via UDP
# to the base container, which will publish it to Redis and make it available
# via WebSocket.
