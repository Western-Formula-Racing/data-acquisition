# MacBook base station — standalone compose (no network_mode: host, no /lib/modules)
# Run from universal-telemetry-software/:
#   docker compose -f deploy/docker-compose.macbook.yml --profile base up -d
#
# REMOTE_IP, INFLUX_SEASON, TIMESCALE_DSN set in deploy/.env

services:
  telemetry:
    profiles: ["base"]
    image: ghcr.io/western-formula-racing/daq-radio/universal-telemetry:latest
    build: ..   # builds locally; remove to use pre-built GHCR image
    container_name: daq-telemetry
    restart: unless-stopped
    ports:
      - "9080:9080"   # WebSocket (Pecan connects here)
      - "8080:8080"   # Status page
      - "5005:5005/udp"
      - "5006:5006/tcp"
    environment:
      - ROLE=base
      - REMOTE_IP=${REMOTE_IP}
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://daq-redis:6379/0
      - WS_PORT=9080
      - STATUS_PORT=8080
      - SIMULATE=false
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - SET_TIME_ENABLED=false
      - ENABLE_TIMESCALE_LOGGING=true
      - POSTGRES_DSN=${TIMESCALE_DSN}
      - TIMESCALE_TABLE=${INFLUX_SEASON:-WFR26}_base
      - DBC_FILE_PATH=/app/example.dbc
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_started

  redis:
    profiles: ["base"]
    image: redis:8.2
    container_name: daq-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  pecan:
    profiles: ["base"]
    image: ghcr.io/western-formula-racing/daq-radio/pecan:latest
    container_name: daq-pecan
    restart: unless-stopped
    ports:
      - "3000:80"   # Pecan dashboard — open http://localhost:3000
    depends_on:
      - telemetry

volumes:
  redis_data:
