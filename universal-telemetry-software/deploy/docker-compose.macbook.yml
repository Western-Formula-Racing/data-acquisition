# MacBook base station — standalone compose (no network_mode: host, no /lib/modules)
# Run from universal-telemetry-software/:
#   docker compose -f deploy/docker-compose.macbook.yml --profile base up -d
#
# REMOTE_IP, INFLUX_SEASON, LOCAL_INFLUX_TOKEN set in deploy/.env

services:
  telemetry:
    profiles: ["base"]
    image: ghcr.io/western-formula-racing/daq-radio/universal-telemetry:latest
    build: ..   # builds locally; remove to use pre-built GHCR image
    container_name: daq-telemetry
    restart: unless-stopped
    ports:
      - "9080:9080"   # WebSocket (Pecan connects here)
      - "8080:8080"   # Status page
      - "5005:5005/udp"
      - "5006:5006/tcp"
    environment:
      - ROLE=base
      - REMOTE_IP=${REMOTE_IP}
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://daq-redis:6379/0
      - WS_PORT=9080
      - STATUS_PORT=8080
      - SIMULATE=false
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - SET_TIME_ENABLED=false
      - ENABLE_INFLUX_LOGGING=true
      - LOCAL_INFLUX_URL=http://daq-influxdb3:8181
      - LOCAL_INFLUX_TOKEN=${LOCAL_INFLUX_TOKEN:-apiv3_local-telemetry-token}
      - LOCAL_INFLUX_ORG=WFR
      - LOCAL_INFLUX_BUCKET=WFR26
      - INFLUX_TABLE=${INFLUX_SEASON:-WFR26}_base
      - DBC_FILE_PATH=/app/active.dbc
      - CLOUD_INFLUX_URL=${CLOUD_INFLUX_URL:-https://influxdb3.westernformularacing.org}
      - CLOUD_INFLUX_TOKEN=${CLOUD_INFLUX_TOKEN:-}
      - CLOUD_INFLUX_ORG=WFR
      - CLOUD_INFLUX_BUCKET=WFR26
      - SYNC_INTERVAL_SECONDS=60
    volumes:
      - ${DBC_HOST_PATH:-../example.dbc}:/app/active.dbc:ro
      - raw_can_data:/app/raw_can_logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_started
      influxdb3:
        condition: service_started
        required: false

  redis:
    profiles: ["base"]
    image: redis:8.2
    container_name: daq-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  pecan:
    profiles: ["base"]
    image: ghcr.io/western-formula-racing/daq-radio/pecan:latest
    container_name: daq-pecan
    restart: unless-stopped
    ports:
      - "3000:80"   # Pecan dashboard — open http://localhost:3000
    depends_on:
      - telemetry

  influxdb3:
    profiles: ["base"]
    image: influxdb:3-core
    container_name: daq-influxdb3
    command: >
      influxdb3 serve
        --node-id influxdb3-local
        --object-store file
        --data-dir /var/lib/influxdb3
        --admin-token-file /influxdb3-admin-token.json
        --wal-snapshot-size 100
        --snapshotted-wal-files-to-keep 10
        --package-manager disabled
    restart: unless-stopped
    ports:
      - "9000:8181"
    volumes:
      - influxdb3_data:/var/lib/influxdb3
      - ../influxdb3-admin-token.json:/influxdb3-admin-token.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  grafana:
    profiles: ["base"]
    image: grafana/grafana
    container_name: daq-grafana
    restart: unless-stopped
    ports:
      - "8087:3000"   # Grafana UI
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 100ms
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb3:
        condition: service_healthy

volumes:
  redis_data:
  influxdb3_data:
  grafana_data:
  raw_can_data:
