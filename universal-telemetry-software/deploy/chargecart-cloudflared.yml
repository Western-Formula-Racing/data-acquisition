# Copy to /etc/cloudflared/chargecart.yml and replace the tunnel fields.
#
# This exposes only the RX websocket path. Do not add 9078 here; the TX bridge
# must remain loopback-only for the physical chargecart screen.

tunnel: chargecart
credentials-file: /home/car/.cloudflared/8675ba25-b084-4e4b-9d89-4aa5061d48ac.json

ingress:
  - hostname: chargecart-ws.westernformularacing.org
    path: /ws
    service: http://127.0.0.1:9080

  - service: http_status:404
