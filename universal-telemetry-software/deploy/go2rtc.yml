# go2rtc — base station WebRTC relay
#
# go2rtc PULLS from the Pi's mediamtx RTSP server (outbound connection).
# This works on all Docker hosts (macOS / Windows / Linux) without any
# port-mapping issues — Docker handles outbound connections natively.
#
# If the radio drops, go2rtc automatically reconnects to the Pi.

streams:
  car-camera: rtsp://10.71.1.10:8554/car-camera

api:
  listen: ":1984"
  origin: "*"

webrtc:
  listen: ":8555/tcp"
  candidates:
    - stun:8555
