server {
    listen 80;
    server_name localhost chargecart.local;

    root /var/www/chargecart;
    index index.html;

    location = / {
        return 302 /chargecart/;
    }

    location = /chargecart {
        return 302 /chargecart/;
    }

    location /chargecart/ {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
