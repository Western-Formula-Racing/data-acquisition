# Windows base station — local LAN stack.
#
# Windows note: Docker Desktop (WSL2) does NOT reliably forward inbound LAN UDP
# from the car into a published container port. To work around that, the
# container's UDP receiver is published on host port 15005 (not 5005), and a
# small native relay (deploy/windows-udp-relay.ps1 / run-windows-relay.bat) binds
# the real LAN port 5005 on Windows and forwards datagrams into 127.0.0.1:15005.
# The relay is pure PowerShell (no Python needed). TCP works normally on Docker
# Desktop, so no relay is needed for the 5006 resend path (the base dials out to
# the car for that).
#
# Run BOTH of these, from universal-telemetry-software/:
#   1) docker compose -f deploy/docker-compose.windows-base.yml --env-file deploy/.env.windows up -d --build
#   2) powershell -ExecutionPolicy Bypass -File deploy\windows-udp-relay.ps1   (or double-click deploy\run-windows-relay.bat)
#
# Default starts telemetry, Redis, and PECAN only.
# Add --profile media for local MediaMTX and stream overlay.
# Add --profile timescale for local TimescaleDB writes.
# Add --profile tunnel for cloudflared relay.
#
# Access points:
#   Pecan dashboard:  http://localhost:3000
#   Status page:      http://localhost:8080
#   TimescaleDB:      postgresql://wfr:wfr_password@localhost:5432/wfr  (timescale profile only)

networks:
  datalink:
    driver: bridge

services:
  telemetry:
    image: ghcr.io/western-formula-racing/data-acquisition/universal-telemetry:latest
    container_name: daq-telemetry
    restart: unless-stopped
    ports:
      - "9080:9080"        # WebSocket (Pecan connects here)
      - "9089:9089"        # WS relay (external access via Cloudflare tunnel)
      - "8080:8080"        # Status page
      - "15005:5005/udp"   # UDP receiver — fed by windows-udp-relay.ps1 on host 5005
      - "5006:5006/tcp"
    environment:
      - ROLE=base
      - REMOTE_IP=${REMOTE_IP:-10.71.1.10}
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://daq-redis:6379/0
      - WS_PORT=9080
      - STATUS_PORT=8080
      - SIMULATE=false
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - SET_TIME_ENABLED=false
      - ENABLE_TIMESCALE_LOGGING=${ENABLE_TIMESCALE_LOGGING:-auto}
      - POSTGRES_DSN=postgresql://wfr:wfr_password@timescaledb:5432/wfr
      - TIMESCALE_TABLE=${TIMESCALE_TABLE:-WFR26test}_base
      - DBC_FILE_PATH=/app/dbc_uploads/active.dbc
      - DBC_UPLOAD_PATH=/app/dbc_uploads/active.dbc
      - ENABLE_WS_RELAY=true
      - RELAY_TOKEN=${RELAY_TOKEN:-}
      - RELAY_REQUIRE_TOKEN_ON_LAN=true
      - RELAY_UPSTREAM_WS=ws://127.0.0.1:9080
    volumes:
      - ${DBC_HOST_PATH:-./example.dbc}:/app/default.dbc:ro
      - uploaded_dbc:/app/dbc_uploads
      - raw_can_data:/app/raw_can_logs
    command: sh -c 'if [ ! -s /app/dbc_uploads/active.dbc ]; then cp /app/default.dbc /app/dbc_uploads/active.dbc; fi; exec python main.py'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy
        required: false
    networks:
      - datalink

  redis:
    image: redis:8.2
    container_name: daq-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - datalink

  pecan:
    image: ghcr.io/western-formula-racing/data-acquisition/pecan:latest
    container_name: daq-pecan
    restart: unless-stopped
    ports:
      - "3000:80"   # Pecan dashboard — open http://localhost:3000
    depends_on:
      - telemetry
    networks:
      - datalink

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: daq-cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run daq-ws-relay
    volumes:
      - ${CLOUDFLARED_CONFIG:-./cloudflared/config.yml}:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDENTIALS:-./cloudflared/credentials.json}:/etc/cloudflared/credentials.json:ro
    depends_on:
      - telemetry
    networks:
      - datalink

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: daq-mediamtx
    profiles:
      - media
    restart: unless-stopped
    ports:
      - "8554:8554/tcp"   # RTSP — car Pi pushes here
      - "8554:8554/udp"   # RTSP RTP/UDP
      - "8889:8889/tcp"   # WebRTC WHEP (Pecan video)
      - "8189:8189/udp"   # WebRTC ICE/UDP
      - "9997:9997"       # API
    volumes:
      - ../mediamtx.yml:/mediamtx.yml:ro
    networks:
      - datalink

  stream-overlay:
    image: nginx:alpine
    container_name: daq-stream-overlay
    profiles:
      - media
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ../../livestream:/usr/share/nginx/html:ro
    networks:
      - datalink

  # ── TimescaleDB (local, for received telemetry hot-load) ─────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: daq-timescaledb
    profiles:
      - timescale
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wfr
      POSTGRES_PASSWORD: wfr_password
      POSTGRES_DB: wfr
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb_init_macbook.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    networks:
      - datalink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfr -d wfr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G

volumes:
  redis_data:
  timescaledb_data:
  uploaded_dbc:
  raw_can_data:
