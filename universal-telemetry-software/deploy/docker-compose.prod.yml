services:
  telemetry:
    profiles: ["car", "base"]
    image: ghcr.io/western-formula-racing/daq-radio/universal-telemetry:latest
    container_name: daq-telemetry
    privileged: true
    network_mode: host # Required for SocketCAN (can0) access on car Pi; safe on base Pi
    restart: unless-stopped
    environment:
      - ROLE=auto # auto, car, or base
      # Set REMOTE_IP to the OTHER device's IP before deploy:
      #   Car Pi (.10)        → REMOTE_IP=192.168.1.20
      #   Base Pi (.20)       → REMOTE_IP=192.168.1.10
      #   ChargeCart Pi (.30) → REMOTE_IP=192.168.1.20
      - REMOTE_IP=192.168.1.20
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://127.0.0.1:6379/0 # 127.0.0.1 required with network_mode: host
      - WS_PORT=9080 # WebSocket for PECAN dashboard
      - STATUS_PORT=8080 # HTTP server for status page
      - SIMULATE=false # Set to true for simulation mode (no hardware)
      - ENABLE_VIDEO=false # Enable video streaming
      - ENABLE_AUDIO=false # Enable audio streaming
      # InfluxDB logging (Base Station only)
      - ENABLE_INFLUX_LOGGING=true
      - LOCAL_INFLUX_URL=http://127.0.0.1:9000 # Host-mapped port (9000:8181) with network_mode: host
      - LOCAL_INFLUX_TOKEN=${LOCAL_INFLUX_TOKEN:-apiv3_local-telemetry-token}
      - LOCAL_INFLUX_ORG=WFR
      - LOCAL_INFLUX_BUCKET=${INFLUX_SEASON:-WFR26}
      - INFLUX_TABLE=${INFLUX_SEASON:-WFR26}_base # e.g. WFR26_base, WFR27_base
      - DBC_FILE_PATH=/app/example.dbc
      # Cloud sync
      - CLOUD_INFLUX_URL=${CLOUD_INFLUX_URL:-https://influxdb3.westernformularacing.org}
      - CLOUD_INFLUX_TOKEN=${CLOUD_INFLUX_TOKEN:-}
      - CLOUD_INFLUX_ORG=WFR
      - CLOUD_INFLUX_BUCKET=${INFLUX_SEASON:-WFR26}
      - SYNC_INTERVAL_SECONDS=60
    volumes:
      - /lib/modules:/lib/modules # In case CAN drivers are needed
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_started
      influxdb3:
        condition: service_started
        required: false

  redis:
    profiles: ["car", "base"]
    image: redis:8.2
    container_name: daq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # TLS terminator — exposes wss://<rpi-ip>:9443 → ws://localhost:9080
  # Required so HTTPS-hosted PWAs (Pecan) can open WebSocket connections.
  # Cert is auto-generated by Caddy's internal CA; no manual setup required.
  caddy:
    profiles: ["car", "base"]
    image: caddy:alpine
    container_name: daq-caddy
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # WebRTC video relay — ingests RTP from car, serves to browsers
  # NOTE: ENABLE_VIDEO must be false on telemetry service to avoid port 5600 conflict
  go2rtc:
    profiles: ["base"]
    image: alexxit/go2rtc:latest
    container_name: daq-go2rtc
    restart: unless-stopped
    ports:
      - "1984:1984/tcp" # API + WHEP endpoint
      - "8555:8555/tcp" # WebRTC TCP
      - "8555:8555/udp" # WebRTC UDP candidates
      - "5600:5600/udp" # RTP ingest from car
    volumes:
      - ../go2rtc.yaml:/config/go2rtc.yaml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  pecan:
    profiles: ["base"]
    image: ghcr.io/western-formula-racing/daq-radio/pecan:latest
    container_name: daq-pecan
    restart: unless-stopped
    ports:
      - "3000:80" # Pecan dashboard UI
    depends_on:
      - telemetry

  # ── Local InfluxDB3 (time-series storage for Grafana) ──────────────────
  influxdb3:
    profiles: ["base"]
    image: influxdb:3.5.0-core
    # Defaulting to linux/amd64 ensures InfluxDB3 works on RPi5 (which uses 16KB pages)
    # via QEMU emulation. RPi4 users must override this to linux/arm64.
    platform: linux/amd64
    container_name: daq-influxdb3
    command: >
      influxdb3 serve
        --node-id influxdb3-local
        --object-store file
        --data-dir /var/lib/influxdb3
        --admin-token-file /influxdb3-admin-token.json
        --wal-snapshot-size 100
        --snapshotted-wal-files-to-keep 10
    restart: unless-stopped
    ports:
      - "9000:8181" # InfluxDB3 API
    volumes:
      - influxdb3_data:/var/lib/influxdb3
      - ../influxdb3-admin-token.json:/influxdb3-admin-token.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8181' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Grafana (dashboards, reads from local InfluxDB3) ──────────────────
  grafana:
    profiles: ["base"]
    image: grafana/grafana
    container_name: daq-grafana
    restart: unless-stopped
    ports:
      - "8087:3000" # Grafana UI
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 100ms
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb3:
        condition: service_healthy

volumes:
  redis_data:
  caddy_data:
  influxdb3_data:
  grafana_data:
