# Raspberry Pi 5 override — run InfluxDB3 under QEMU amd64 emulation
#
# The RPi5 kernel uses 16KB memory pages; influxdb3's bundled jemalloc only
# supports 4KB pages, so the native ARM64 binary crashes at startup.
# Forcing linux/amd64 lets it run under QEMU instead.
#
# Prerequisites (one-time setup on the Pi 5):
#   sudo apt-get install -y qemu-user-static binfmt-support
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.rpi5.yml up -d

services:
  influxdb3:
    platform: linux/amd64

