# Staging compose — pulls :test-latest images built from non-main branches.
# Use this to validate a branch build on real hardware before merging to main.
#
# Usage:
#   docker compose -f docker-compose.staging.yml pull
#   docker compose -f docker-compose.staging.yml up -d
#
# To tear down and clean up volumes:
#   docker compose -f docker-compose.staging.yml down -v

services:
  telemetry:
    image: ghcr.io/western-formula-racing/universal-telemetry:test-latest
    container_name: daq-telemetry
    privileged: true
    restart: unless-stopped
    ports:
      - "5005:5005/udp" # UDP CAN data
      - "5006:5006/tcp" # TCP retransmission
      - "8080:8080/tcp" # Status HTTP server
      - "9080:9080/tcp" # WebSocket for PECAN
    environment:
      - ROLE=auto # auto, car, or base
      - REMOTE_IP=192.168.1.100 # IP of the other RPi
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://redis:6379/0
      - WS_PORT=9080
      - STATUS_PORT=8080
      - SIMULATE=true # Set to true for simulation mode
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      # TimescaleDB logging (Base Station only)
      - ENABLE_TIMESCALE_LOGGING=true
      - POSTGRES_DSN=${TIMESCALE_DSN}
      - TIMESCALE_TABLE=${TIMESCALE_SEASON:-WFR26}_base
      - DBC_FILE_PATH=/app/example.dbc
    volumes:
      - /lib/modules:/lib/modules
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:8.2
    container_name: daq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # TLS terminator — exposes wss://<rpi-ip>:9443 → ws://localhost:9080
  # Required so HTTPS-hosted PWAs (Pecan) can open WebSocket connections.
  # Cert is auto-generated by Caddy's internal CA; no manual setup required.
  caddy:
    image: caddy:alpine
    container_name: daq-caddy
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: daq-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554/tcp"
      - "8554:8554/udp"
      - "8889:8889/tcp"
      - "8189:8189/udp"
      - "9997:9997"
    volumes:
      - ../mediamtx.yml:/mediamtx.yml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  pecan:
    image: ghcr.io/western-formula-racing/pecan:test-latest
    container_name: daq-pecan
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - telemetry

volumes:
  redis_data:
  caddy_data:
