# Raspberry Pi base station — lightweight ephemeral receiver
# Run this on a Pi at the track for quick diagnostics without full stack.
# Data is NOT persisted — use macbook-base for permanent TimescaleDB recording.
#
# Usage:
#   docker compose -f deploy/docker-compose.rpi-base.yml --profile base up -d
#
# Access points:
#   Pecan dashboard: http://<pi-ip>:3000

services:
  telemetry:
    profiles: ["base"]
    image: ghcr.io/western-formula-racing/daq-radio/universal-telemetry:latest
    container_name: daq-telemetry
    privileged: true
    network_mode: host
    restart: unless-stopped
    environment:
      - ROLE=base
      - REMOTE_IP=${REMOTE_IP}
      - UDP_PORT=5005
      - TCP_PORT=5006
      - REDIS_URL=redis://127.0.0.1:6379/0
      - WS_PORT=9080
      - STATUS_PORT=8080
      - SIMULATE=false
      - ENABLE_VIDEO=false
      - ENABLE_AUDIO=false
      - SET_TIME_ENABLED=false
      # No TimescaleDB logging — this is ephemeral
      - ENABLE_TIMESCALE_LOGGING=false
      - DBC_FILE_PATH=/app/example.dbc
    volumes:
      - /lib/modules:/lib/modules
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_started

  redis:
    profiles: ["base"]
    image: redis:8.2
    container_name: daq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # TLS terminator — exposes wss://<pi-ip>:9443 → ws://localhost:9080
  caddy:
    profiles: ["base"]
    image: caddy:alpine
    container_name: daq-caddy
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  pecan:
    profiles: ["base"]
    image: ghcr.io/western-formula-racing/daq-radio/pecan:latest
    container_name: daq-pecan
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - telemetry

volumes:
  redis_data:
  caddy_data:
